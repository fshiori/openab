name: Report stale issues with no linked PR

on:
  schedule:
    - cron: '30 9 * * *'  # daily at 09:30 UTC
  workflow_dispatch: {}

jobs:
  report-unlinked-stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 14;
            const MAX_REPORT_ITEMS = 50;
            const cutoff = new Date(Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000)
              .toISOString().slice(0, 10);

            // This query is a triage signal only. Issue age and the absence of
            // a closing-reference PR do not authorize changing issue state.
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue state:open -linked:pr created:<${cutoff}`;
            core.info(`query: ${query}`);

            const { data: result } = await github.rest.search.issuesAndPullRequests({
              q: query,
              sort: 'created',
              order: 'asc',
              per_page: MAX_REPORT_ITEMS,
            });

            const candidates = result.items.slice(0, MAX_REPORT_ITEMS);
            const escapeCell = (value) => String(value)
              .replace(/\\/g, '\\\\')
              .replace(/\|/g, '\\|')
              .replace(/\r?\n/g, ' ');

            const rows = candidates.map((issue) => {
              const labels = issue.labels
                .map((label) => typeof label === 'string' ? label : label.name)
                .filter(Boolean)
                .join(', ') || '—';
              return `| [#${issue.number}](${issue.html_url}) | ${escapeCell(issue.title)} | ${issue.created_at.slice(0, 10)} | ${issue.updated_at.slice(0, 10)} | ${escapeCell(labels)} |`;
            });

            if (rows.length === 0) {
              rows.push('| — | No candidates found | — | — | — |');
            }

            const remaining = Math.max(result.total_count - candidates.length, 0);
            const summary = [
              `Query: \`${query}\``,
              '',
              `Found **${result.total_count}** open issue(s) created more than ${STALE_DAYS} days ago with no closing-reference PR.`,
              `Showing the oldest **${candidates.length}** candidate(s).${remaining > 0 ? ` **${remaining}** additional candidate(s) are not shown.` : ''}`,
              '',
              '> This workflow is report-only. It does not comment on, label, or close issues.',
              '',
              '| Issue | Title | Created | Updated | Labels |',
              '|---|---|---|---|---|',
              ...rows,
            ];

            await core.summary
              .addHeading('Unlinked stale issue triage report')
              .addRaw(summary.join('\n'))
              .write();

            core.info(`reported ${candidates.length} of ${result.total_count} candidate issue(s); no issue state was changed`);
