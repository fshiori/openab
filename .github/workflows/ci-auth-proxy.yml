name: CI (openab-auth-proxy)

on:
  pull_request:
    paths:
      - "openab-auth-proxy/**"
  push:
    branches: [main]
    paths:
      - "openab-auth-proxy/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openab-auth-proxy
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-07-13)
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (2026-03-12)
        with:
          workspaces: openab-auth-proxy

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build (release)
        run: cargo build --release
